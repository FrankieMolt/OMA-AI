version: '3.8'

services:
  oma-ai:
    image: node:20-alpine
    container_name: oma-ai-web
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - /home/oldpc/oma-ai-repo:/app
    command: sh -c "npm install && npm run build && npm start"
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oma-ai.rule=Host(`oma-ai.com`)"
      - "traefik.http.routers.oma-ai.tls=true"
      - "traefik.http.routers.oma-ai.tls.certresolver=letsencrypt"
      - "traefik.http.services.oma-ai.loadbalancer.server.port=3000"

networks:
  coolify:
    external: true
