<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
    <defs>
        <linearGradient id="omaGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ffd9" />
            <stop offset="50%" stop-color="#00d4ff" />
            <stop offset="100%" stop-color="#7b00ff" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Background (transparent) -->
    <rect width="512" height="512" fill="none" />
    <!-- Main Icon: 4 squares grid -->
    <g filter="url(#glow)">
        <rect x="48" y="48" width="192" height="192" rx="32" fill="url(#omaGradIcon)" />
        <rect x="272" y="48" width="192" height="192" rx="32" fill="url(#omaGradIcon)" opacity="0.85" />
        <rect x="48" y="272" width="192" height="192" rx="32" fill="url(#omaGradIcon)" opacity="0.85" />
        <rect x="272" y="272" width="192" height="192" rx="32" fill="url(#omaGradIcon)" />
    </g>
</svg>