<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
    <defs>
        <linearGradient id="spinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ffd9" />
            <stop offset="100%" stop-color="#7b00ff" />
        </linearGradient>
    </defs>
    <circle cx="20" cy="20" r="16" stroke="url(#spinGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="80"
        stroke-dashoffset="60" fill="none">
        <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="1s"
            repeatCount="indefinite" />
    </circle>
</svg>