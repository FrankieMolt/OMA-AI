<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80" fill="none">
    <defs>
        <linearGradient id="logoFullGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ffd9" />
            <stop offset="100%" stop-color="#7b00ff" />
        </linearGradient>
    </defs>
    <!-- Icon: 4 squares -->
    <g>
        <rect x="8" y="8" width="28" height="28" rx="5" fill="url(#logoFullGrad)" />
        <rect x="44" y="8" width="28" height="28" rx="5" fill="url(#logoFullGrad)" opacity="0.85" />
        <rect x="8" y="44" width="28" height="28" rx="5" fill="url(#logoFullGrad)" opacity="0.85" />
        <rect x="44" y="44" width="28" height="28" rx="5" fill="url(#logoFullGrad)" />
    </g>
    <!-- Text: OpenMarketAccess -->
    <text x="96" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600"
        fill="#ffffff">
        <tspan fill="#00ffd9">Open</tspan>
        <tspan fill="#ffffff">Market</tspan>
        <tspan fill="#7b00ff">Access</tspan>
    </text>
</svg>