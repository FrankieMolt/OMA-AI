<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffd9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="0" y="0" width="200" height="200" rx="40" fill="none" />
  <g>
    <rect x="20" y="20" width="65" height="65" rx="12" fill="url(#iconGrad)" filter="url(#iconGlow)" />
    <rect x="115" y="20" width="65" height="65" rx="12" fill="url(#iconGrad)" opacity="0.85" />
    <rect x="20" y="115" width="65" height="65" rx="12" fill="url(#iconGrad)" opacity="0.85" />
    <rect x="115" y="115" width="65" height="65" rx="12" fill="url(#iconGrad)" filter="url(#iconGlow)" />
  </g>
</svg>
