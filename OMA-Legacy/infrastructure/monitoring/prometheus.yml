global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'oma-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
        - targets: ['localhost:9090']

  - job_name: 'nextjs-app'
    metrics_path: '/metrics'
    static_configs:
        - targets: ['host.docker.internal:3000']
        labels:
          app: 'oma-web'

  - job_name: 'fastapi-cortex'
    metrics_path: '/metrics'
    static_configs:
        - targets: ['host.docker.internal:8000']
        labels:
          app: 'oma-cortex'

  - job_name: 'postgres'
    static_configs:
        - targets: ['postgres_exporter:9187']
        labels:
          db: 'oma-db'

  - job_name: 'redis'
    static_configs:
        - targets: ['redis_exporter:9121']
        labels:
          cache: 'oma-redis'

  - job_name: 'node-exporter'
    static_configs:
        - targets: ['node-exporter:9100']
        labels:
          host: 'production'
