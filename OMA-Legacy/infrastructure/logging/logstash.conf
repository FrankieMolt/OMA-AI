input {
  beats {
    port => 5044
    codec => json
  }
  
  http {
    port => 5000
    codec => json
  }
}

filter {
  if [fields][service] == "oma-web" {
    mutate {
      add_field => { "service_type" => "nextjs" }
    }
  } else if [fields][service] == "oma-cortex" {
    mutate {
      add_field => { "service_type" => "fastapi" }
    }
  }
  
  if [message] =~ /ERROR/ {
    mutate {
      add_field => { "log_level" => "error" }
    }
  } else if [message] =~ /WARN/ {
    mutate {
      add_field => { "log_level" => "warning" }
    }
  } else {
    mutate {
      add_field => { "log_level" => "info" }
    }
  }
  
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
  
  mutate {
    remove_field => ["host", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "oma-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  
  stdout {
    codec => rubydebug
  }
}
