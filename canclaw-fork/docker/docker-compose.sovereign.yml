version: '3.8'

services:
  # Ollama - Local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: canclaw-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - canclaw-network
    # Security: Run as non-root if possible
    security_opt:
      - no-new-privileges:true
    # Resource limits for cheap VPS
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G

  # CanClaw - Sovereign Canadian AI Assistant
  canclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - NODE_ENV=production
    container_name: canclaw-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - canclaw-memory:/app/memory
      - canclaw-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Sovereignty settings
      - LLM_PROVIDER=ollama
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen3:8b
      - BLOCK_FOREIGN_APIS=true
      - DATA_RESIDENCY=CA
      
      # Language
      - LANGUAGE_PREFERENCE=auto
      - BILINGUAL_MODE=true
      
      # Privacy
      - TELEMETRY_ENABLED=false
      - ANALYTICS_ENABLED=false
      - CRASH_REPORTS_ENABLED=false
      - MEMORY_BACKEND=local
      - MEMORY_PATH=/app/memory
      
      # Security
      - SANDBOX_ENABLED=true
      - TOOL_PERMISSIONS=ask
      
      # Canadian features
      - CANADIAN_SPELLING=true
      - METRIC_SYSTEM=true
      - WEATHER_PROVIDER=environment-canada
      - GOVERNMENT_SERVICES_ENABLED=true
      
      # System
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
    networks:
      - canclaw-network
    depends_on:
      - ollama
    security_opt:
      - no-new-privileges:true
    # Resource limits for cheap VPS
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  ollama-data:
    driver: local
  canclaw-memory:
    driver: local
  canclaw-config:
    driver: local

networks:
  canclaw-network:
    driver: bridge
    internal: false
