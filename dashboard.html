<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🧟‍♂️ Frankie's Control Center</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
  color: #c9d1d9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  padding: 20px;
}
.header {
  text-align: center;
  margin-bottom: 30px;
  padding: 20px;
  background: linear-gradient(90deg, #58a6ff, #a371f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header h1 { font-size: 32px; }
.header p { color: #8b949e; -webkit-text-fill-color: #8b949e; margin-top: 10px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
  max-width: 1600px;
  margin: 0 auto;
}

.card {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 20px;
}
.card h2 {
  color: #58a6ff;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.btn {
  background: #238636;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 15px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
  text-align: center;
}
.btn:hover { background: #2ea043; transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn:disabled { background: #484f58; cursor: not-allowed; }

.status-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}
.status-box {
  background: #0d1117;
  border-radius: 8px;
  padding: 15px;
  text-align: center;
}
.status-value {
  font-size: 28px;
  font-weight: bold;
  color: #3fb950;
}
.status-label {
  font-size: 12px;
  color: #8b949e;
  margin-top: 5px;
}

.log-container {
  background: #0d1117;
  border-radius: 8px;
  padding: 15px;
  max-height: 300px;
  overflow-y: auto;
  font-family: 'SFMono-Regular', monospace;
  font-size: 12px;
}
.log-entry {
  padding: 5px 0;
  border-bottom: 1px solid #21262d;
}
.log-time { color: #6e7681; margin-right: 10px; }
.log-type { color: #58a6ff; margin-right: 10px; }
.log-success { color: #3fb950; }
.log-error { color: #f85149; }

.site-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.site-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0d1117;
  padding: 12px;
  border-radius: 8px;
}
.site-name { font-weight: 600; }
.site-status {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.site-up { background: #238636; color: white; }
.site-down { background: #f85149; color: white; }

.task-input {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
.task-input input {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 10px;
  color: #c9d1d9;
}
.task-input button {
  background: #58a6ff;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 20px;
  cursor: pointer;
}

.task-list {
  list-style: none;
}
.task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: #0d1117;
  border-radius: 6px;
  margin-bottom: 8px;
}
.task-check {
  width: 20px;
  height: 20px;
  border: 2px solid #30363d;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.task-check.done { background: #238636; border-color: #238636; }
.task-text { flex: 1; }
.task-text.done { text-decoration: line-through; color: #8b949e; }

.memory-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.memory-item {
  background: #0d1117;
  padding: 12px;
  border-radius: 6px;
  cursor: pointer;
}
.memory-item:hover { background: #161b22; }
.memory-name { color: #58a6ff; font-weight: 600; }
.memory-date { color: #8b949e; font-size: 12px; }

.full-width { grid-column: 1 / -1; }
.loading { opacity: 0.6; }
.result { 
  margin-top: 10px; 
  padding: 10px; 
  background: #0d1117; 
  border-radius: 6px;
  font-size: 12px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🧟‍♂️ FRANKIE'S CONTROL CENTER</h1>
  <p>Interactive Dashboard - Press buttons to trigger real actions</p>
</div>

<div class="grid">

  <!-- ACTIONS -->
  <div class="card">
    <h2>⚡ Quick Actions</h2>
    <div class="btn-grid">
      <button class="btn" onclick="scanSites()" id="btn-scan">🔍 Scan Sites</button>
      <button class="btn" onclick="runAudit()" id="btn-audit">📊 Full Audit</button>
      <button class="btn" onclick="triggerResearch()" id="btn-research">🔬 Research</button>
      <button class="btn" onclick="deployAll()" id="btn-deploy">🚀 Deploy</button>
      <button class="btn" onclick="runBackup()" id="btn-backup">💾 Backup</button>
      <button class="btn" onclick="runEvolve()" id="btn-evolve">🧬 Evolve</button>
    </div>
    <div id="action-result"></div>
  </div>

  <!-- SITE STATUS -->
  <div class="card">
    <h2>🌐 Production Sites</h2>
    <div id="site-status" class="site-list">
      <div class="site-item"><span class="site-name">Loading...</span></div>
    </div>
  </div>

  <!-- SYSTEM STATS -->
  <div class="card">
    <h2>💻 System Status</h2>
    <div class="status-grid">
      <div class="status-box">
        <div class="status-value" id="stat-sites">3/3</div>
        <div class="status-label">Sites Up</div>
      </div>
      <div class="status-box">
        <div class="status-value" id="stat-services">4</div>
        <div class="status-label">Services</div>
      </div>
      <div class="status-box">
        <div class="status-value" id="stat-uptime">--</div>
        <div class="status-label">Uptime</div>
      </div>
    </div>
    <div id="system-details"></div>
  </div>

  <!-- TASKS -->
  <div class="card">
    <h2>📋 Tasks</h2>
    <div class="task-input">
      <input type="text" id="new-task-text" placeholder="Enter new task...">
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="task-list" class="task-list">
      <li class="task-item"><div class="task-check"></div><span class="task-text">Loading...</span></li>
    </ul>
  </div>

  <!-- MEMORIES -->
  <div class="card">
    <h2>🧠 Memories</h2>
    <div id="memory-list" class="memory-list">
      <div class="memory-item"><div class="memory-name">Loading...</div></div>
    </div>
  </div>

  <!-- ACTIVITY LOG -->
  <div class="card full-width">
    <h2>📝 Activity Log</h2>
    <div id="activity-log" class="log-container">
      <div class="log-entry"><span class="log-time">--:--:--</span><span>Waiting for actions...</span></div>
    </div>
  </div>

</div>

<script>
const API_BASE = 'http://192.168.2.213:3000/api';
const LB_BASE = 'http://192.168.2.213:8081/api';

// Logging
function log(type, message) {
  const container = document.getElementById('activity-log');
  const time = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="log-time">${time}</span><span class="log-type">${type}</span><span class="${type === 'ERROR' ? 'log-error' : type === 'SUCCESS' ? 'log-success' : ''}">${message}</span>`;
  container.insertBefore(div, container.firstChild);
}

// Actions
async function scanSites() {
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  log('INFO', 'Starting site scan...');
  
  try {
    const res = await fetch(`${API_BASE}/scan`, { method: 'POST' });
    const data = await res.json();
    
    if (data.results) {
      updateSiteStatus(data.results.sites);
      log('SUCCESS', `Scan complete: ${data.results.sites.filter(s => s.healthy).length}/${data.results.sites.length} sites healthy`);
      
      // Update system stats
      document.getElementById('stat-sites').textContent = `${data.results.sites.filter(s => s.healthy).length}/${data.results.sites.length}`;
    }
  } catch (e) {
    log('ERROR', 'Scan failed: ' + e.message);
  }
  
  btn.disabled = false;
  btn.textContent = '🔍 Scan Sites';
}

async function runAudit() {
  log('INFO', 'Starting full site audit...');
  await scanSites();
  log('SUCCESS', 'Audit complete!');
}

async function triggerResearch() {
  const btn = document.getElementById('btn-research');
  btn.disabled = true;
  log('INFO', 'Starting research on: agentic web');
  
  try {
    const res = await fetch(`${API_BASE}/research`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: 'agentic web' })
    });
    const data = await res.json();
    log('SUCCESS', data.message || 'Research triggered');
  } catch (e) {
    log('ERROR', 'Research failed: ' + e.message);
  }
  
  btn.disabled = false;
}

async function deployAll() {
  const btn = document.getElementById('btn-deploy');
  btn.disabled = true;
  log('INFO', 'Starting deployment...');
  
  try {
    const res = await fetch(`${API_BASE}/deploy`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ site: 'all' })
    });
    const data = await res.json();
    log('SUCCESS', data.message || 'Deployment triggered');
  } catch (e) {
    log('ERROR', 'Deploy failed: ' + e.message);
  }
  
  btn.disabled = false;
}

async function runBackup() {
  const btn = document.getElementById('btn-backup');
  btn.disabled = true;
  log('INFO', 'Starting backup...');
  
  try {
    const res = await fetch(`${LB_BASE}/pages/frankie-controls/backup`, { method: 'POST' });
    const data = await res.json();
    log('SUCCESS', data.message || 'Backup triggered');
  } catch (e) {
    log('ERROR', 'Backup failed: ' + e.message);
  }
  
  btn.disabled = false;
}

async function runEvolve() {
  const btn = document.getElementById('btn-evolve');
  btn.disabled = true;
  log('INFO', 'Starting evolution...');
  
  try {
    const res = await fetch(`${LB_BASE}/pages/frankie-controls/evolve`, { method: 'POST' });
    const data = await res.json();
    log('SUCCESS', data.message || 'Evolution triggered');
  } catch (e) {
    log('ERROR', 'Evolve failed: ' + e.message);
  }
  
  btn.disabled = false;
}

// Site status
function updateSiteStatus(sites) {
  const container = document.getElementById('site-status');
  container.innerHTML = sites.map(s => `
    <div class="site-item">
      <span class="site-name">${s.name}</span>
      <span class="site-status ${s.healthy ? 'site-up' : 'site-down'}">${s.status} ${s.responseTime || ''}</span>
    </div>
  `).join('');
}

// Tasks
async function loadTasks() {
  try {
    const res = await fetch(`${LB_BASE}/todos`);
    const data = await res.json();
    const list = document.getElementById('task-list');
    list.innerHTML = data.map(t => `
      <li class="task-item">
        <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask('${t.text}')">${t.done ? '✓' : ''}</div>
        <span class="task-text ${t.done ? 'done' : ''}">${t.text}</span>
      </li>
    `).join('');
  } catch (e) {
    console.error('Failed to load tasks', e);
  }
}

async function addTask() {
  const input = document.getElementById('new-task-text');
  const text = input.value.trim();
  if (!text) return;
  
  try {
    await fetch(`${LB_BASE}/todos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'add', text })
    });
    input.value = '';
    loadTasks();
    log('SUCCESS', `Added task: ${text}`);
  } catch (e) {
    log('ERROR', 'Failed to add task');
  }
}

async function toggleTask(text) {
  try {
    await fetch(`${LB_BASE}/todos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'toggle', id: text })
    });
    loadTasks();
  } catch (e) {}
}

// Memories
async function loadMemories() {
  try {
    const res = await fetch(`${API_BASE}/memory`);
    const data = await res.json();
    const list = document.getElementById('memory-list');
    list.innerHTML = data.files.slice(0, 5).map(f => `
      <div class="memory-item" onclick="viewMemory('${f.name}')">
        <div class="memory-name">📄 ${f.name}</div>
        <div class="memory-date">${new Date(f.modified).toLocaleDateString()}</div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Failed to load memories', e);
  }
}

function viewMemory(name) {
  log('INFO', `Viewing memory: ${name}`);
  window.open(`${API_BASE}/memory?file=${name}`, '_blank');
}

// Initialize
loadTasks();
loadMemories();
scanSites(); // Auto-scan on load

// Auto-refresh every 30s
setInterval(() => {
  loadTasks();
  loadMemories();
}, 30000);

log('INFO', 'Dashboard initialized - Ready for commands!');
</script>

</body>
</html>
