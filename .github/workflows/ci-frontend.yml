name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboard/**'
      - '.github/workflows/ci-frontend.yml'
      - 'src/**'
      - 'app/**'
      - 'components/**'
      - 'lib/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'dashboard/**'
      - 'src/**'
      - 'app/**'
      - 'components/**'
      - 'lib/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: dashboard/package-lock.json
    - name: Install dependencies
      run: |
        cd dashboard
        npm ci
    - name: Run linting
      run: |
        cd dashboard
        npm run lint --if-present || true
    - name: Run tests
      run: |
        cd dashboard
        npm test -- --passWithNoTests || true
    - name: Build
      run: |
        cd dashboard
        npm run build