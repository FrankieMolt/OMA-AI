name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build

    - name: Verify build output
      run: |
        echo "Build artifacts:"
        ls -la .next/
        du -sh .next/static/chunks/*.js 2>/dev/null | head -5

    - name: Check Vercel token
      id: vercel_status
      run: |
        if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
          echo "VERCEL_TOKEN_MISSING=true" >> $GITHUB_OUTPUT
          echo "⚠️ Vercel token not configured"
        else
          echo "VERCEL_TOKEN_MISSING=false" >> $GITHUB_OUTPUT
        fi

    - name: Deploy to Vercel (if token available)
      if: env.VERCEL_TOKEN_MISSING != 'true'
      run: |
        npm install --global vercel@latest
        vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
        echo "vercel_url=$url" >> $GITHUB_OUTPUT
        echo "✅ Deployed: $url"
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Post-deploy
      run: |
        if [ "${{ env.VERCEL_TOKEN_MISSING }}" == "true" ]; then
          echo "✅ Build completed successfully"
          echo "❌ Vercel deploy skipped — add secrets to enable:"
          echo "  • VERCEL_TOKEN (from vercel.com/account/tokens)"
          echo "  • VERCEL_ORG_ID=team_o2xBKRJm2RldM5qyhnW2NNAt"
          echo "  • VERCEL_PROJECT_ID=prj_9B9CcPuYXD7HLIAiTHnKbejQlIvM"
        else
          echo "✅ Vercel deployment complete"
        fi
