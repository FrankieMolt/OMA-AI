name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci || npm install --ignore-scripts

    - name: Build project
      run: npm run build

    - name: Verify build output
      run: |
        echo "Build artifacts:"
        ls -la .next/
        echo "First load JS size:"
        du -sh .next/static/chunks/*.js 2>/dev/null | head -5

    - name: Check Vercel token status
      id: vercel_status
      run: |
        if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
          echo "VERCEL_TOKEN_MISSING=true" >> $GITHUB_OUTPUT
          echo "⚠️ Vercel token not configured — skipping Vercel deployment"
          echo "To enable Vercel deployment:"
          echo "1. Go to https://github.com/NosytLabs/OMA-AI/settings/secrets/actions"
          echo "2. Add VERCEL_TOKEN (format: ncp_...)"
          echo "3. Add VERCEL_ORG_ID=team_o2xBKRJm2RldM5qyhnW2NNAt"
          echo "4. Add VERCEL_PROJECT_ID=prj_9B9CcPuYXD7HLIAiTHnKbejQlIvM"
        else
          echo "VERCEL_TOKEN_MISSING=false" >> $GITHUB_OUTPUT
        fi

    - name: Deploy to Vercel (if token available)
      if: env.VERCEL_TOKEN_MISSING != 'true'
      run: |
        npm install --global vercel@latest
        vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
        echo "vercel_url=$url" >> $GITHUB_OUTPUT
        echo "✅ Deployed to: $url"
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Post-deploy status
      run: |
        if [ "${{ env.VERCEL_TOKEN_MISSING }}" == "true" ]; then
          echo "✅ Build completed successfully"
          echo "✅ Next.js 15 app built and ready"
          echo "❌ Vercel deploy skipped — token not configured"
          echo ""
          echo "To fix Vercel deploy, add these secrets to GitHub:"
          echo "  VERCEL_TOKEN: ncp_... (from vercel.com/account/tokens)"
          echo "  VERCEL_ORG_ID: team_o2xBKRJm2RldM5qyhnW2NNAt"
          echo "  VERCEL_PROJECT_ID: prj_9B9CcPuYXD7HLIAiTHnKbejQlIvM"
        else
          echo "✅ Vercel deploy completed"
        fi
