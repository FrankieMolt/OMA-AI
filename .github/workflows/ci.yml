name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'backend/**'
      - 'dashboard/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'backend/**'
      - 'dashboard/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: timeout 60 npm run lint || true

      - name: Build
        run: npm run build