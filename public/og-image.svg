<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative grid -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accentGrad)"/>
  
  <!-- Logo Circle -->
  <circle cx="150" cy="315" r="80" fill="url(#accentGrad)"/>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">O</text>
  
  <!-- Main Title -->
  <text x="280" y="290" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="white">
    OMA-AI
  </text>
  
  <!-- Subtitle -->
  <text x="280" y="360" font-family="Inter, Arial, sans-serif" font-size="32" fill="#a1a1aa">
    Open Market Access for AI Agents
  </text>
  
  <!-- Tagline -->
  <text x="280" y="420" font-family="Inter, Arial, sans-serif" font-size="24" fill="#71717a">
    The API Marketplace for Humans and Agents • x402 Payments
  </text>
  
  <!-- Stats -->
  <g transform="translate(280, 480)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="100" y="25" font-family="Arial" font-size="16" fill="#a855f7" text-anchor="middle">22+ APIs</text>
    <text x="100" y="48" font-family="Arial" font-size="14" fill="#71717a" text-anchor="middle">&amp; MCP Servers</text>
    
    <rect x="220" y="0" width="200" height="60" rx="8" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
    <text x="320" y="25" font-family="Arial" font-size="16" fill="#3b82f6" text-anchor="middle">x402 Payments</text>
    <text x="320" y="48" font-family="Arial" font-size="14" fill="#71717a" text-anchor="middle">USDC on Base</text>
    
    <rect x="440" y="0" width="200" height="60" rx="8" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1"/>
    <text x="540" y="25" font-family="Arial" font-size="16" fill="#22c55e" text-anchor="middle">Pay Per Call</text>
    <text x="540" y="48" font-family="Arial" font-size="14" fill="#71717a" text-anchor="middle">No Subscriptions</text>
  </g>
  
  <!-- URL -->
  <text x="1100" y="590" font-family="Arial, sans-serif" font-size="20" fill="#52525b" text-anchor="end">
    oma-ai.com
  </text>
</svg>
