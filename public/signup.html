<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/styles-enhanced.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://oma-ai.com/signup">
    <title>Sign Up - OMA-AI | Open Market Access</title>
    <meta name="description" content="Create your OMA-AI account and start building AI agent APIs.">
    <link rel="stylesheet" href="/quick-wins.css">
<style>
        body { font-family: 'Inter', sans-serif; background: #09090b; color: #fafafa; }
        .gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6, #d946ef); }
    </style>
<link rel="stylesheet" href="/design-system.css">
<link rel="stylesheet" href="/responsive.css">
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <a href="/" class="flex items-center justify-center gap-3 mb-8">
            <div class="w-12 h-12 gradient rounded-xl flex items-center justify-center font-bold">OMA</div>
        </a>
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">Get Started Free</h1>
            <p class="text-zinc-400">Join 2,400+ developers building AI agents</p>
        </div>

        <!-- Trust Signals -->
        <div class="flex justify-center gap-6 mb-6 text-sm text-zinc-400">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                <span>No credit card</span>
            </div>
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                <span>1000 calls/day free</span>
            </div>
        </div>

        <!-- Wallet Signup (Primary) -->
        <div class="glass rounded-2xl p-6 border border-white/5 mb-4">
            <h2 class="font-semibold mb-4 flex items-center gap-2">
                <span><svg class="w-6 h-6"><use href="/icons.svg#icon-zap"/></svg></span>
                <span>Quick Start with Wallet</span>
            </h2>
            
            <div class="space-y-3">
                <button onclick="connectWallet('metamask')" class="w-full py-3 px-4 bg-violet-500/20 hover:bg-violet-500/30 border border-violet-500/30 rounded-xl flex items-center justify-center gap-3 transition">
                    <img src="https://cryptologos.cc/logos/metamask-mask-logo.svg" class="w-6 h-6" alt="MetaMask" width="24" height="24">
                    <span class="font-medium">MetaMask</span>
                    <span class="text-xs text-violet-400 ml-auto">Recommended</span>
                </button>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="connectWallet('coinbase')" class="py-3 px-4 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center justify-center gap-2 transition">
                        <img src="https://cryptologos.cc/logos/coinbase-coin-logo.svg" class="w-5 h-5" alt="Coinbase" width="24" height="24">
                        <span class="text-sm">Coinbase</span>
                    </button>
                    <button onclick="connectWallet('phantom')" class="py-3 px-4 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center justify-center gap-2 transition">
                        <img src="https://cryptologos.cc/logos/phantom-phantom-logo.svg" class="w-5 h-5" alt="Phantom" width="24" height="24">
                        <span class="text-sm">Phantom</span>
                    </button>
                </div>
            </div>
            
            <p class="text-xs text-zinc-500 mt-4 text-center">
                Your keys never leave your device. We use SIWE for secure authentication.
            </p>
        </div>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-zinc-700"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-4 bg-zinc-900 text-zinc-500">or use email</span></div>
        </div>

        <!-- Email Signup (Secondary) -->
        <div class="glass rounded-2xl p-6 border border-white/5">
            <form onsubmit="handleSignup(event)" class="space-y-4" id="signup-form">
                <div>
                    <label for="email" class="block text-sm text-zinc-400 mb-2">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="you@example.com" 
                        class="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-xl focus:border-violet-500 focus:outline-none transition"
                        required
                    >
                </div>
                
                <div>
                    <label for="password" class="block text-sm text-zinc-400 mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="Min 8 characters" 
                        class="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-xl focus:border-violet-500 focus:outline-none transition"
                        required
                        minlength="8"
                    >
                </div>
                
                <div class="flex items-start gap-2">
                    <input type="checkbox" id="terms" name="terms" required class="mt-1 cursor-pointer">
                    <label for="terms" class="text-sm text-zinc-400 cursor-pointer">
                        I agree to the <a href="/terms" class="text-violet-400 hover:underline">Terms</a> and <a href="/privacy" class="text-violet-400 hover:underline">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="w-full py-3 gradient rounded-xl font-semibold hover:opacity-90 transition">
                    Create Free Account
                </button>
            </form>
        </div>

        <p class="text-center text-zinc-500 text-sm mt-6">
            Already have an account? <a href="/login" class="text-violet-400 hover:underline">Sign in</a>
        </p>
    </div>

    <script>
        async function connectWallet(provider) {
            const button = event.target.closest('button');
            const originalText = button.innerHTML;
            button.innerHTML = '<span class="animate-pulse">Connecting...</span>';
            button.disabled = true;

            try {
                let address = null;
                
                if (provider === 'metamask' && window.ethereum) {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    address = accounts[0];
                } else if (provider === 'phantom' && window.solana) {
                    const resp = await window.solana.connect();
                    address = resp.publicKey.toString();
                } else if (provider === 'coinbase' && window.coinbaseWalletExtension) {
                    const accounts = await window.coinbaseWalletExtension.request({ method: 'eth_requestAccounts' });
                    address = accounts[0];
                } else {
                    throw new Error('Please install ' + provider);
                }
                
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wallet_address: address })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('oma_user', JSON.stringify(data.user));
                    if (data.api_key) localStorage.setItem('oma_api_key', data.api_key);
                    
                    button.innerHTML = '✓ Connected: ' + address.slice(0,6) + '...' + address.slice(-4);
                    button.classList.add('bg-green-500/20', 'border-green-500/30');
                    
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    throw new Error(data.error || 'Signup failed');
                }
            } catch (error) {
                button.innerHTML = originalText;
                button.disabled = false;
                alert(error.message);
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const form = e.target;
            const button = form.querySelector('button[type="submit"]');
            const originalText = button.innerHTML;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            button.innerHTML = '<span class="animate-pulse">Creating account...</span>';
            button.disabled = true;

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('oma_user', JSON.stringify(data.user));
                    if (data.api_key) localStorage.setItem('oma_api_key', data.api_key);
                    
                    button.innerHTML = '✓ Account created!';
                    button.classList.remove('gradient');
                    button.classList.add('bg-green-500');
                    
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    throw new Error(data.error || 'Signup failed');
                }
            } catch (error) {
                button.innerHTML = originalText;
                button.disabled = false;
                alert(error.message);
            }
        }
    </script>
</body>
</html>
