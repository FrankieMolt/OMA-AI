<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#09090b"/>
  
  <!-- Gradient Circle -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <circle cx="256" cy="256" r="180" fill="url(#gradient)" opacity="0.2"/>
  <circle cx="256" cy="256" r="140" fill="url(#gradient)" opacity="0.4"/>
  <circle cx="256" cy="256" r="100" fill="url(#gradient)"/>
  
  <!-- OMA Text -->
  <text x="256" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="80" fill="white">
    OMA
  </text>
  
  <!-- AI Text (smaller) -->
  <text x="256" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-weight="normal" font-size="40" fill="#e0e7ff">
    AI
  </text>
</svg>
