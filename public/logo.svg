<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- Inner Glow Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glowGradient)" stroke-width="4" opacity="0.5"/>
  
  <!-- OMA Text -->
  <text x="256" y="290" font-family="Inter, Arial, sans-serif" font-size="140" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-5">
    OMA
  </text>
  
  <!-- AI Badge -->
  <rect x="320" y="310" width="80" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="360" y="340" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">
    AI
  </text>
  
  <!-- Decorative Dots (representing network/marketplace) -->
  <circle cx="140" cy="180" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="180" cy="140" r="6" fill="rgba(255,255,255,0.3)"/>
  <circle cx="372" cy="140" r="6" fill="rgba(255,255,255,0.3)"/>
  <circle cx="400" cy="180" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="140" cy="340" r="6" fill="rgba(255,255,255,0.3)"/>
  <circle cx="120" cy="280" r="4" fill="rgba(255,255,255,0.2)"/>
</svg>
