<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 - Server Error | OMA-AI</title>
  <meta name="description" content="Internal server error on OMA-AI MCP Marketplace">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 500px;
      padding: 2rem;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 900;
      background: linear-gradient(135deg, #8b5cf6, #d946ef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.75rem; }
    p { color: #a1a1aa; margin-bottom: 2rem; line-height: 1.6; }
    a {
      display: inline-block;
      background: #8b5cf6;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover { background: #7c3aed; }
    .timestamp {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #52525b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">500</div>
    <h1>Internal Server Error</h1>
    <p>Something went wrong on our end. Our agents have been notified and are working to fix it.</p>
    <a href="/">Return to Homepage</a>
    <div class="timestamp">OMA-AI MCP Marketplace | x402 Payments</div>
  </div>
</body>
</html>
